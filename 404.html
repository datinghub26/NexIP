<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | NexIP</title>

    <meta name="description"
        content="The page you are looking for could not be found.">

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{

            margin:0;

            font-family:Inter,Arial,sans-serif;

            background:#0B1120;

            color:#fff;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            text-align:center;

        }

        .wrapper{

            max-width:700px;

            padding:40px;

        }

        h1{

            font-size:8rem;

            margin:0;

            background:linear-gradient(90deg,#60A5FA,#2563EB);

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;

        }

        h2{

            font-size:2rem;

            margin-top:10px;

        }

        p{

            color:#94A3B8;

            line-height:1.8;

            margin:25px 0 40px;

        }

        .btn{

            display:inline-block;

            padding:15px 35px;

            background:#2563EB;

            color:#fff;

            text-decoration:none;

            border-radius:12px;

            font-weight:600;

            transition:.3s;

        }

        .btn:hover{

            background:#1D4ED8;

            transform:translateY(-3px);

        }

    </style>

</head>

<body>

<div class="wrapper">

    <h1>

        404

    </h1>

    <h2>

        Oops! Page Not Found

    </h2>

    <p>

        The page you're looking for doesn't exist,
        has been moved, or the URL may be incorrect.

    </p>

    <a href="/" class="btn">

        ← Back to Home

    </a>

</div>

</body>

</html>
